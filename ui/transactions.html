<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transactions - FinQuery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  main { width: 100%; max-width: 60rem; flex: 1; padding: 96px 24px 24px; }
  .page-head { margin-bottom: 16px; }
  .page-head h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 2px; }
  #filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
  #filters input { flex: 1; min-width: 160px; }
  #summary { font-size: .85rem; color: var(--text-2); margin-bottom: 12px; }
  #summary b { color: var(--text); }
  .table-wrap { overflow-x: auto; border: 2px solid var(--border); border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th { text-align: left; padding: 10px 14px; background: var(--bg-alt);
       font-size: .7rem; font-weight: 700; text-transform: uppercase;
       letter-spacing: .05em; color: var(--muted); white-space: nowrap; }
  td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: top; }
  td.date { white-space: nowrap; color: var(--text-2); }
  td.amount { text-align: right; white-space: nowrap; font-weight: 600; }
  td.amount.credit { color: var(--credit); }
  td.cat { white-space: nowrap; color: var(--text-2); }
  td.cat .sub { display: block; font-size: .75rem; color: var(--muted); }
  tfoot td { border-top: 2px solid var(--border); background: var(--bg-alt);
             padding: 12px 14px; font-weight: 700; }
  tfoot .total-label { font-size: .7rem; text-transform: uppercase;
                       letter-spacing: .05em; color: var(--muted); }
  tfoot .total-amount { text-align: right; white-space: nowrap; font-size: 1rem; }
  tfoot .total-amount .split { display: block; font-size: .75rem;
                               font-weight: 500; color: var(--text-2); }
  .empty { padding: 24px; text-align: center; color: var(--muted); }
  @media (max-width: 640px) { main { padding: 84px 16px 16px; } }
</style>
</head>
<body>
<header>
  <div class="nav">
    <a class="wordmark" href="/">FinQuery</a>
    <div class="nav-right">
      <div class="nav-links">
        <a class="nav-link" href="/">Chat</a>
        <a class="nav-link" href="/transactions.html">Transactions</a>
        <a class="nav-link" href="/pii.html">PII log</a>
      </div>
      <button id="theme" type="button" title="Toggle theme">&#9788;</button>
    </div>
  </div>
</header>
<main>
  <div class="page-head">
    <p class="kicker">Verify the answers</p>
    <h1>Transactions</h1>
  </div>
  <div id="filters">
    <select id="month"><option value="">All months</option></select>
    <select id="category"><option value="">All categories</option></select>
    <select id="subcategory"><option value="">All subcategories</option></select>
    <select id="type">
      <option value="">Credit + debit</option>
      <option value="debit">Debit only</option>
      <option value="credit">Credit only</option>
    </select>
    <input id="search" type="search" placeholder="Search description" autocomplete="off">
  </div>
  <p id="summary"></p>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Date</th><th>Description</th><th>Category</th><th style="text-align:right">Amount</th></tr></thead>
      <tbody id="rows"></tbody>
      <!-- Totals live in the table, not just in the summary line above, so a
           screenshot of the filtered ledger carries its own arithmetic. This
           is what an answer from the agent is checked against. -->
      <tfoot id="totals" hidden>
        <tr>
          <td colspan="3" class="total-label">Total for these filters</td>
          <td class="total-amount" id="total-amount"></td>
        </tr>
      </tfoot>
    </table>
    <div class="empty" id="empty" hidden>No transactions match these filters.</div>
  </div>
</main>
<script src="/common.js"></script>
<script>
const monthSel = document.getElementById("month");
const catSel = document.getElementById("category");
const subSel = document.getElementById("subcategory");
const typeSel = document.getElementById("type");
const search = document.getElementById("search");
const tbody = document.getElementById("rows");
const empty = document.getElementById("empty");
const summary = document.getElementById("summary");
const totals = document.getElementById("totals");
const totalAmount = document.getElementById("total-amount");
const MONTH_FMT = new Intl.DateTimeFormat("en-IN", { month: "long", year: "numeric" });

let ALL = [];

function fillOptions(sel, values, label) {
  values.forEach(v => {
    const o = document.createElement("option");
    o.value = v; o.textContent = label ? label(v) : v;
    sel.appendChild(o);
  });
}

/* Subcategories are scoped to the chosen category so the list stays short and
   cannot offer a combination that matches nothing. A selection that the new
   category does not contain is dropped rather than silently kept. */
function syncSubcategories() {
  const chosen = subSel.value;
  const pool = catSel.value ? ALL.filter(t => t.category === catSel.value) : ALL;
  const subs = [...new Set(pool.map(t => t.subcategory).filter(Boolean))].sort();
  subSel.innerHTML = '<option value="">All subcategories</option>';
  fillOptions(subSel, subs);
  subSel.value = subs.includes(chosen) ? chosen : "";
}

function render() {
  const month = monthSel.value, cat = catSel.value, type = typeSel.value;
  const sub = subSel.value;
  const q = search.value.trim().toLowerCase();
  const rows = ALL.filter(t =>
    (!month || t.txn_date.startsWith(month)) &&
    (!cat || t.category === cat) &&
    (!sub || t.subcategory === sub) &&
    (!type || t.txn_type === type) &&
    (!q || t.bank_description.toLowerCase().includes(q)));

  let debit = 0, credit = 0;
  tbody.innerHTML = "";
  rows.forEach(t => {
    if (t.txn_type === "debit") debit += t.amount; else credit += t.amount;
    const tr = document.createElement("tr");
    const cat = document.createElement("td");
    cat.className = "cat";
    cat.textContent = t.category || "";
    if (t.subcategory) {
      const sub = document.createElement("span");
      sub.className = "sub"; sub.textContent = t.subcategory;
      cat.appendChild(sub);
    }
    const cells = [
      Object.assign(document.createElement("td"), { className: "date", textContent: t.txn_date }),
      Object.assign(document.createElement("td"), { textContent: t.bank_description }),
      cat,
      Object.assign(document.createElement("td"), {
        className: "amount " + t.txn_type,
        textContent: (t.txn_type === "credit" ? "+" : "-") + INR.format(t.amount).replace("₹", "₹ "),
      }),
    ];
    cells.forEach(c => tr.appendChild(c));
    tbody.appendChild(tr);
  });
  empty.hidden = rows.length > 0;

  /* The summary line names what is being counted; the footer carries the
     money. Keeping the totals in one place avoids two figures that could
     ever disagree. */
  const active = [monthSel, catSel, subSel, typeSel]
    .filter(sel => sel.value)
    .map(sel => sel.options[sel.selectedIndex].textContent);
  if (search.value.trim()) active.push(`"${search.value.trim()}"`);
  summary.innerHTML = [`<b>${rows.length}</b> transactions`, ...active]
    .join(" &middot; ");

  totals.hidden = rows.length === 0;
  if (debit && credit) {
    totalAmount.innerHTML =
      `- ${INR.format(debit)}<span class="split">+ ${INR.format(credit)} credits`
      + ` &middot; net ${INR.format(credit - debit)}</span>`;
  } else {
    totalAmount.textContent = (credit ? "+ " : "- ") + INR.format(credit || debit);
  }
}

async function load() {
  try {
    const res = await fetch("/transactions?user_id=1");
    if (!res.ok) throw new Error("HTTP " + res.status);
    ALL = await res.json();
  } catch (err) {
    empty.textContent = "Could not load transactions: " + err.message;
    empty.hidden = false;
    return;
  }
  const months = [...new Set(ALL.map(t => t.txn_date.slice(0, 7)))].sort().reverse();
  const cats = [...new Set(ALL.map(t => t.category).filter(Boolean))].sort();
  fillOptions(monthSel, months, m => MONTH_FMT.format(new Date(m + "-01")));
  fillOptions(catSel, cats);
  syncSubcategories();
  render();
}

catSel.onchange = () => { syncSubcategories(); render(); };
[monthSel, subSel, typeSel].forEach(el => el.onchange = render);
search.oninput = render;
load();
</script>
</body>
</html>
