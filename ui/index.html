<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FinQuery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  main { width: 100%; max-width: 760px; flex: 1; display: flex; flex-direction: column;
         padding: 96px 24px 0; }
  .tagline { color: var(--text-2); font-size: .95rem; text-align: center;
             max-width: 32rem; margin: 0 auto 24px; line-height: 1.6; }
  #chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .chip { background: var(--bg-alt); border: 1px solid var(--border); color: var(--text-2);
          border-radius: 8px; padding: 6px 12px; font-size: .78rem; font-weight: 500;
          font-family: inherit; cursor: pointer; transition: all .2s; max-width: 100%; }
  .chip:hover { border-color: var(--border-hover); color: var(--text); }
  #thread { flex: 1; display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .msg { padding: 12px 16px; border-radius: 8px; max-width: 85%;
         white-space: pre-wrap; line-height: 1.6; font-size: .95rem; }
  .q { background: var(--brand); color: var(--on-brand); align-self: flex-end; font-weight: 500; }
  .a { background: var(--bg); border: 2px solid var(--border); align-self: flex-start; }
  .a .cites { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border);
              font-size: .72rem; font-weight: 700; text-transform: uppercase;
              letter-spacing: .05em; color: var(--muted); }
  .a .steps { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
  .a .steps-title { font-size: .68rem; font-weight: 700; text-transform: uppercase;
                    letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
  .step { display: flex; gap: 8px; align-items: baseline; margin: 5px 0;
          font-size: .8rem; line-height: 1.45; white-space: normal; }
  .step .n { color: var(--muted); font-weight: 700; flex: none; }
  .step code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
               font-size: .74rem; background: var(--bg-alt);
               border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; }
  .step .sum { display: block; color: var(--muted); font-size: .74rem; margin-top: 2px; }
  .a .meta { margin-top: 8px; font-size: .7rem; color: var(--muted); }
  .a .meta .refused { color: #dc2626; font-weight: 700; }
  form { position: sticky; bottom: 0; background: var(--bg);
         display: flex; gap: 8px; padding: 12px 0 24px; }
  input { flex: 1; min-width: 0; }
  @media (max-width: 640px) {
    main { padding: 84px 16px 0; }
    .msg { max-width: 92%; }
    form { padding-bottom: 16px; }
    #approach { padding-left: 6px; padding-right: 6px; }
  }
</style>
</head>
<body>
<header>
  <div class="nav">
    <a class="wordmark" href="/">FinQuery</a>
    <div class="nav-right">
      <div class="nav-links">
        <a class="nav-link" href="/">Chat</a>
        <a class="nav-link" href="/transactions.html">Transactions</a>
        <a class="nav-link" href="/pii.html">PII log</a>
      </div>
      <button id="theme" type="button" title="Toggle theme">&#9788;</button>
    </div>
  </div>
</header>
<main>
  <p class="tagline">Ask about your transactions or personal-finance concepts. Single turn, exact numbers, cited sources.</p>
  <div id="chips"></div>
  <div id="thread"></div>
  <form id="f">
    <select id="approach" title="Answering approach">
      <option value="agent">Agent</option>
      <option value="rag">Vanilla RAG</option>
    </select>
    <input id="q" placeholder="e.g. How much did I spend on groceries in June?" autocomplete="off" required>
    <button type="submit" class="btn">Ask</button>
  </form>
</main>
<script src="/common.js"></script>
<script>
const SUGGESTED = [
  "How much did I spend on Food & Drinks in June?",
  "Am I over budget on Transport?",
  "What is the 50/30/20 rule?",
  "How big should my emergency fund be?",
  "After paying my EMIs I can't save enough. What should I do?",
];
const chips = document.getElementById("chips");
const thread = document.getElementById("thread");
const form = document.getElementById("f");
const qInput = document.getElementById("q");

SUGGESTED.forEach(s => {
  const b = document.createElement("button");
  b.type = "button"; b.className = "chip"; b.textContent = s;
  b.onclick = () => { qInput.value = s; form.requestSubmit(); };
  chips.appendChild(b);
});

function renderBold(container, text) {
  // minimal, safe **bold** rendering: no innerHTML, just text + <strong> nodes
  text.split(/(\*\*[^*]+\*\*)/g).forEach(part => {
    const m = /^\*\*([^*]+)\*\*$/.exec(part);
    if (m) {
      const strong = document.createElement("strong");
      strong.textContent = m[1];
      container.appendChild(strong);
    } else if (part) {
      container.appendChild(document.createTextNode(part));
    }
  });
}

function add(cls, text, data) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  renderBold(d, text);
  if (data) {
    renderSteps(d, data);
    const kb = (data.citations || []).filter(x => x.kind !== "sql_tool");
    if (kb.length) {
      const c = document.createElement("div");
      c.className = "cites";
      c.textContent = "Sources: " + [...new Set(kb.map(x => x.ref))].join(" | ");
      d.appendChild(c);
    }
    const meta = document.createElement("div");
    meta.className = "meta";
    const bits = [data.approach === "rag" ? "Vanilla RAG" : "Agent"];
    if (data.latency_ms != null) bits.push((data.latency_ms / 1000).toFixed(1) + "s");
    meta.textContent = bits.join(" · ");
    if (data.refused) {
      const r = document.createElement("span");
      r.className = "refused"; r.textContent = " · refused";
      meta.appendChild(r);
    }
    d.appendChild(meta);
  }
  thread.appendChild(d);
  d.scrollIntoView({ behavior: "smooth" });
}

function renderSteps(bubble, data) {
  const wrap = document.createElement("div");
  wrap.className = "steps";
  const title = document.createElement("div");
  title.className = "steps-title";
  const list = [];
  if (data.approach === "rag") {
    title.textContent = "How this was answered";
    const n = (data.citations || []).length;
    list.push({ call: "retrieve top " + n + " chunks (cosine)", sum: "one LLM call, no tools" });
  } else {
    title.textContent = "ReAct steps";
    (data.tool_calls || []).forEach(t => {
      const args = Object.entries(t.args || {})
        .map(([k, v]) => k + "=" + v).join(", ");
      list.push({ call: t.tool + "(" + args + ")", sum: t.summary || "" });
    });
    list.push({ call: "write the final answer", sum: "", plain: true });
  }
  if (!list.length) return;
  wrap.appendChild(title);
  list.forEach((s, i) => {
    const row = document.createElement("div");
    row.className = "step";
    const n = document.createElement("span");
    n.className = "n"; n.textContent = (i + 1) + ".";
    row.appendChild(n);
    const body = document.createElement("span");
    if (s.plain) {
      body.textContent = s.call;
    } else {
      const code = document.createElement("code");
      code.textContent = s.call;
      body.appendChild(code);
      if (s.sum) {
        const sum = document.createElement("span");
        sum.className = "sum"; sum.textContent = "→ " + s.sum;
        body.appendChild(sum);
      }
    }
    row.appendChild(body);
    wrap.appendChild(row);
  });
  bubble.appendChild(wrap);
}

form.onsubmit = async (e) => {
  e.preventDefault();
  const question = qInput.value.trim();
  if (!question) return;
  add("q", question);
  qInput.value = "";
  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, user_id: 1, approach: document.getElementById("approach").value }),
    });
    const data = await res.json();
    if (!res.ok) {
      add("a", "Error " + res.status + ": " + (data.detail || "request failed"));
      return;
    }
    add("a", data.answer, data);
  } catch (err) {
    add("a", "Request failed: " + err.message);
  }
};
</script>
</body>
</html>
